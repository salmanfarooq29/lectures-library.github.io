<div class="graph-page px-4">
    <h1 class="text-2xl font-bold mb-4">خريطة الموقع</h1>
    <p class="text-muted mb-4">اضغط على أي عقدة للانتقال إلى الصفحة. يمكنك السحب والتكبير.</p>
    <div id="full-graph-container" class="full-graph-wrapper" dir="ltr">
        <div id="full-graph"></div>
    </div>
</div>

<!-- D3.js for force-directed graph -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
    const graphContainer = document.getElementById('full-graph');
    
    // Graph configuration
    const config = {
        nodeRadius: 10,
        linkDistance: 120,
        chargeStrength: -400,
        fontSize: 12,
        maxLabelLength: 30
    };
    
    // Fetch graph data
    fetch('/index.json')
        .then(response => response.json())
        .then(data => {
            initGraph(data);
        })
        .catch(error => {
            console.error('Error loading graph data:', error);
            graphContainer.innerHTML = '<p class="text-muted p-4">لا تتوفر بيانات الخريطة</p>';
        });
    
    function initGraph(data) {
        const container = document.getElementById('full-graph');
        const rect = container.getBoundingClientRect();
        const width = rect.width || 800;
        const height = rect.height || 600;
        
        let { nodes, links } = processGraphData(data);
        
        if (nodes.length === 0) {
            container.innerHTML = '<p class="text-muted p-4">لا توجد صفحات</p>';
            return;
        }
        
        // Create SVG
        const svg = d3.select('#full-graph')
            .append('svg')
            .attr('width', '100%')
            .attr('height', '100%')
            .attr('viewBox', `0 0 ${width} ${height}`)
            .attr('preserveAspectRatio', 'xMidYMid meet');
        
        // Add zoom behavior
        const g = svg.append('g');
        
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
        
        svg.call(zoom);
        
        // Create force simulation
        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(config.linkDistance))
            .force('charge', d3.forceManyBody().strength(config.chargeStrength))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(40));
        
        // Draw links
        const link = g.append('g')
            .attr('class', 'links')
            .selectAll('line')
            .data(links)
            .enter()
            .append('line')
            .attr('class', d => `graph-link ${d.type === 'tag' ? 'tag-link' : 'direct-link'}`)
            .attr('stroke-opacity', d => d.type === 'tag' ? 0.2 : 0.5);
        
        // Draw nodes
        const node = g.append('g')
            .attr('class', 'nodes')
            .selectAll('g')
            .data(nodes)
            .enter()
            .append('g')
            .attr('class', 'node')
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended));
        
        // Node circles
        node.append('circle')
            .attr('r', config.nodeRadius)
            .attr('class', 'graph-node');
        
        // Node labels - centered above node for Arabic text
        node.append('text')
            .text(d => truncateLabel(d.title, config.maxLabelLength))
            .attr('x', 0)
            .attr('y', -15)
            .attr('text-anchor', 'middle')
            .attr('class', 'graph-label');
        
        // Hover effects
        node.on('mouseover', function(event, d) {
            d3.select(this).select('circle').attr('r', config.nodeRadius + 4);
            d3.select(this).select('text').style('font-weight', 'bold').style('font-size', '14px');
            
            // Highlight connected links
            link.attr('stroke-opacity', l => 
                (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.05
            );
            
            // Dim unconnected nodes
            node.style('opacity', n => {
                if (n.id === d.id) return 1;
                const isConnected = links.some(l => 
                    (l.source.id === d.id && l.target.id === n.id) ||
                    (l.target.id === d.id && l.source.id === n.id)
                );
                return isConnected ? 1 : 0.2;
            });
        })
        .on('mouseout', function(event, d) {
            d3.select(this).select('circle').attr('r', config.nodeRadius);
            d3.select(this).select('text').style('font-weight', 'normal').style('font-size', '12px');
            link.attr('stroke-opacity', l => l.type === 'tag' ? 0.2 : 0.5);
            node.style('opacity', 1);
        })
        .on('click', function(event, d) {
            window.location.href = d.id;
        });
        
        // Update positions on tick
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
        
        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
    }
    
    function processGraphData(data) {
        const nodes = data.nodes;
        
        // Remove duplicate links
        const uniqueLinks = [];
        const linkSet = new Set();
        data.links.forEach(link => {
            const key = [link.source, link.target].sort().join('->');
            if (!linkSet.has(key)) {
                linkSet.add(key);
                uniqueLinks.push(link);
            }
        });
        
        return { nodes, links: uniqueLinks };
    }
    
    function truncateLabel(text, maxLength) {
        if (!text) return '';
        return text.length > maxLength ? text.substring(0, maxLength - 3) + '...' : text;
    }
})();
</script>
