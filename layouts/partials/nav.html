<header class="sticky top-0 z-50 w-full border-b border-stone-200 dark:border-stone-800 bg-white/95 dark:bg-stone-950/95 backdrop-blur supports-[backdrop-filter]:bg-white/60 dark:supports-[backdrop-filter]:bg-stone-950/60">
  <nav class="container max-w-3xl mx-auto px-4 md:px-6">
    <div class="flex h-16 items-center justify-between">
      <!-- Logo -->
      <a class="flex items-center gap-2.5" href="{{ .Site.BaseURL }}">
        <span class="text-xl">🌿</span>
        <span class="text-stone-900 dark:text-stone-100 text-lg font-bold">{{ .Site.Title }}</span>
      </a>

      <!-- Navigation -->
      <div class="flex items-center gap-1">
        <ul class="hidden md:flex items-center gap-1">
          {{ range .Site.Menus.main }}
          <li>
            <a class="px-4 py-2 rounded-md text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors font-medium" 
               href="{{ .URL }}">
              {{ .Name }}
            </a>
          </li>
          {{ end }}
        </ul>

        <!-- Theme Toggle -->
        <button aria-label="تبديل الوضع" id="toggle-theme" 
                class="p-2.5 rounded-md text-stone-500 hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-100 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors">
          {{ partial "icons/moon.html" .}}
          {{ partial "icons/sun.html" .}}
        </button>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden p-2.5 rounded-md hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden py-4 border-t border-stone-200 dark:border-stone-800">
      <ul class="flex flex-col gap-1">
        {{ range .Site.Menus.main }}
        <li>
          <a class="block px-4 py-2.5 rounded-md text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors font-medium" 
             href="{{ .URL }}">
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </div>
  </nav>
</header>
