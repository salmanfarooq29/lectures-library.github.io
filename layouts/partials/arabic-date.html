<script>
    (function () {
        // Arabic month names
        const arabicMonths = [
            "يناير",
            "فبراير",
            "مارس",
            "أبريل",
            "مايو",
            "يونيو",
            "يوليو",
            "أغسطس",
            "سبتمبر",
            "أكتوبر",
            "نوفمبر",
            "ديسمبر",
        ];

        // Arabic numerals (Eastern Arabic)
        const arabicNumerals = [
            "٠",
            "١",
            "٢",
            "٣",
            "٤",
            "٥",
            "٦",
            "٧",
            "٨",
            "٩",
        ];

        // Convert Western numerals to Eastern Arabic numerals
        function toArabicNumerals(num) {
            return String(num)
                .split("")
                .map((digit) => arabicNumerals[parseInt(digit)])
                .join("");
        }

        // Get current date or date from data attribute
        const dateElement = document.currentScript.parentElement;
        let date;

        if (dateElement.dataset.date) {
            date = new Date(dateElement.dataset.date);
        } else {
            date = new Date();
        }

        const day = toArabicNumerals(date.getDate());
        const month = arabicMonths[date.getMonth()];
        const year = toArabicNumerals(date.getFullYear());

        // Format: day month year (e.g., ١٥ يناير ٢٠٢٤)
        const arabicDate = `${day} ${month} ${year}`;

        // Write the date to the document
        document.write(arabicDate);
    })();
</script>
