baseURL = "https://zahi.netlify.app/"
title = "زاهي"
languageCode = "ar"
defaultContentLanguage = "ar"

# Enable useful features
enableRobotsTXT = false
enableEmoji = true
enableGitInfo = true

# Outputs
[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

# Taxonomies
[taxonomies]
tag = "tags"
series = "series"

# Sitemap
[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

# Hugo Modules
[module]
  [[module.imports]]
    path = "github.com/mohamedelhefni/zahi"
    
  [[module.mounts]]
    source = "content"
    target = "content"
    
  [[module.mounts]]
    source = "static"
    target = "static"

# Navigation Menu
[menu]
[[menu.main]]
identifier = "home"
name = "الرئيسية"
url = "/"
weight = 10

[[menu.main]]
identifier = "posts"
name = "المدونه"
url = "/posts"
weight = 20

[[menu.main]]
identifier = "series"
name = "السلاسل"
url = "/series"
weight = 25

[[menu.main]]
identifier = "projects"
name = "المشاريع"
url = "/projects"
weight = 27

[[menu.main]]
identifier = "graph"
name = "الخريطة"
url = "/graph"
weight = 30

# Site Parameters
[params]
# Site Info
description = "زاهي - قالب هوجو عربي حديث مصمم كحديقة رقمية مع مميزات شبيهة بـ Obsidian"
author = "محمد الحفني"
keywords = ["مدونة", "برمجة", "تقنية", "عربي", "حديقة رقمية"]

# Social links (shown in footer)
github = "https://www.github.com/mohamedelhefni"
mail = "mailto:mohamed.elhefni@outlook.com"
site = "https://hefni101.netlify.app/"

# Social handles (for Twitter Cards)
[params.social]
twitter = "mohamedelhefni"
github = "mohamedelhefni"

# Open Graph default image (place in static/images/)
# ogImage = "images/og-default.png"

# Site verification (optional)
# [params.verification]
# google = "your-google-verification-code"
# bing = "your-bing-verification-code"

# Analytics (optional)
[params.analytics]
#   [params.analytics.google]
#     id = "G-XXXXXXXXXX"
#   [params.analytics.plausible]
#     domain = "zahi.netlify.app"
  [params.analytics.siraaj]
    apiUrl = "https://siraaj.live"
    projectId = "zahi"
    autoTrack = true

# Disqus comments (optional)
# [services]
# [services.disqus]
# shortname = 'your-disqus-shortname'

# Related content
[related]
includeNewer = true
threshold = 80
toLower = true
[[related.indices]]
  name = "tags"
  weight = 100
[[related.indices]]
  name = "series"
  weight = 80
[[related.indices]]
  name = "date"
  weight = 10

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "dracula"
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2

# Privacy (GDPR)
[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    respectDoNotTrack = true
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true
