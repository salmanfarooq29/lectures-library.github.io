baseURL = "https://salmanfarooq29.github.io/lectures-library.github.io/"
title = "Lectures Library"
languageCode = "en"
defaultContentLanguage = "en"

# Essential fixes for GitHub Pages sub-folders
canonifyURLs = true
relativeURLs = true

[params]
  description = "Educational Lectures Library"
  author = "The Professor"
  darkMode = false 

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 1
  [languages.ar]
    languageName = "العربية"
    contentDir = "content/ar"
    weight = 2

[taxonomies]
  series = "series"
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark.renderer]
    unsafe = true 

# Privacy settings (Updated for Hugo 2026)
[privacy]
  [privacy.x]
    enableDNT = true
