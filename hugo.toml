baseURL = "https://salmanfarooq29.github.io/lectures-library.github.io/"
title = "مكتبة المحاضرات"
languageCode = "ar"
defaultContentLanguage = "ar"

# These two lines are the SECRET to fixing the "Big Q"
canonifyURLs = true
relativeURLs = true

[params]
  description = "مكتبة المحاضرات التعليمية"
  author = "البروفيسور"
  darkMode = false 

[languages]
  [languages.ar]
    languageName = "العربية"
    contentDir = "content/ar"
    weight = 1
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2

[taxonomies]
  series = "series"
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
