baseURL = "/lectures-library.github.io/"
title = "مكتبة المحاضرات"
languageCode = "ar"
defaultContentLanguage = "ar"

# Zahi Theme Configuration
[params]
  description = "مكتبة المحاضرات التعليمية"
  author = "البروفيسور"
  darkMode = false 

[languages]
  [languages.ar]
    languageName = "العربية"
    contentDir = "content/ar"
    weight = 1
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2

# Privacy settings (Updated for Hugo 2026)
[privacy]
  [privacy.x]
    enableDNT = true

[taxonomies]
  series = "series"
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
